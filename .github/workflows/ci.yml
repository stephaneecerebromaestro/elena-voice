name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Lint and test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      GHL_PIT: test
      GHL_LOCATION_ID: test
      VAPI_API_KEY: test
      VAPI_ASSISTANT_ID: 1631c7cf-2914-45f9-bf82-6635cdf00aba
      ANTHROPIC_API_KEY: test
      SUPABASE_URL: https://test.supabase.co
      SUPABASE_SERVICE_KEY: test
      TELEGRAM_BOT_TOKEN: test
      TELEGRAM_CHAT_ID: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax + import tests
        run: python tests/test_syntax.py

      - name: Multi-treatment config tests
        run: python tests/test_bots_config.py

      - name: Audit script smoke tests
        run: python tests/test_audit_continuous.py

      - name: Prompt drift detector smoke tests
        run: python tests/test_prompt_drift.py

      - name: Summary
        if: success()
        run: echo "All tests passed - safe to deploy."
